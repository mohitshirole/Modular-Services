worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Master Fleet Routing
    server {
        listen 80;
        server_name localhost;

        # --- HEALTH CHECKS ---
        
        location /v1/auth/health {
            proxy_pass http://identity-gateway:4004/health;
        }

        location /v1/tally/health {
            proxy_pass http://tally-gateway:4001/health;
        }

        location /v1/sheets/health {
            proxy_pass http://sheets-engine:4002/health;
        }

        location /v1/comm/health {
            proxy_pass http://comm-gateway:4003/health;
        }

        location /v1/pdf/health {
            proxy_pass http://pdf-engine:4005/health;
        }

        location /v1/telemetry/health {
            proxy_pass http://telemetry-engine:4006/health;
        }

        location /v1/scheduler/health {
            proxy_pass http://scheduler-service:4007/health;
        }

        location /v1/payments/health {
            proxy_pass http://payments-hub:4008/health;
        }

        location /v1/storage/health {
            proxy_pass http://media-hub:4009/health;
        }

        # --- CORE API ROUTES ---

        # 1. Identity Gateway
        location /v1/auth/ {
            proxy_pass http://identity-gateway:4004/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Tally Gateway
        location /v1/tally/ {
            proxy_pass http://tally-gateway:4001/api/v1/tally/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Sheets Engine
        location /v1/sheets/ {
            proxy_pass http://sheets-engine:4002/api/v1/sheets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Communication Gateway
        location /v1/comm/ {
            proxy_pass http://comm-gateway:4003/api/v1/comm/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. PDF Engine
        location /v1/pdf/ {
            proxy_pass http://pdf-engine:4005/api/v1/pdf/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 6. Telemetry & Audit
        location /v1/telemetry/ {
            proxy_pass http://telemetry-engine:4006/api/v1/telemetry/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 7. Scheduler Service
        location /v1/scheduler/ {
            proxy_pass http://scheduler-service:4007/api/v1/scheduler/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 8. Payments Hub
        location /v1/payments/ {
            proxy_pass http://payments-hub:4008/api/v1/payments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 9. Media Hub (Storage)
        location /v1/storage/ {
            proxy_pass http://media-hub:4009/api/v1/storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 100M;
        }

        # Master Gateway Health
        location /health {
            return 200 '{"status":"UP","service":"modular-gateway","message":"Fleet Gateway is Operational"}';
            add_header Content-Type application/json;
        }
    }
}
